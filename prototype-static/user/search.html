<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search</title>

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#efe4cf;
}

/* HEADER */
.header{
  background:#b08f6b;
  color:white;
  padding:18px 25px;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
}

.header h3{
  margin:0;
}

.header p{
  margin:5px 0 0;
  font-size:14px;
}

/* CONTENT */
.container{
  padding:20px;
  padding-bottom:90px; /* space for navbar */
}

.search-box{
  background:white;
  border-radius:30px;
  padding:15px;
  display:flex;
  gap:10px;
  align-items:center;
}

.search-box input{
  border:none;
  outline:none;
  font-size:16px;
  width:100%;
}

.result{
  background:#dccbb5;
  border-radius:22px;
  padding:15px;
  margin-top:15px;
}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#dccbb5;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top-left-radius:25px;
  border-top-right-radius:25px;
}

.navbar div{
  text-align:center;
  font-size:12px;
  color:#5d4a35;
  cursor:pointer;
}

.navbar i{
  display:block;
  font-size:20px;
  margin-bottom:3px;
}

.active{
  color:#7b5538;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h3>Search</h3>
  <p>Find complaints, locations</p>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="search-box">
    <i class="bi bi-search"></i>
    <input type="text" placeholder="Search complaint or location">
  </div>

  <div class="result">
    <strong>Garbage Issue – Market Area</strong>
    <p>Status: In Progress</p>
  </div>

  <div class="result">
    <strong>Streetlight – Sector 9</strong>
    <p>Status: Resolved</p>
  </div>

</div>

<!-- NAVBAR (ONLY 3 ITEMS) -->
<div class="navbar">
  <div onclick="location.href='user_dashboard.html'">
    <i class="bi bi-house"></i>
    Home
  </div>

  <div class="active" onclick="location.href='search.html'">
    <i class="bi bi-search"></i>
    Search
  </div>

  <div onclick="location.href='profile.html'">
    <i class="bi bi-person"></i>
    Profile
  </div>
</div>

</body>
</html>
