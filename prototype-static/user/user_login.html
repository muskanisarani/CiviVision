<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CiviVision – User Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/user.css">
</head>
<body>

<div class="auth-card">
  <h3>User Login</h3>

  <form id="loginForm">

    <div class="mb-3">
      <label>Login With</label>
      <select id="loginType" class="form-select">
        <option value="email">Email (Gmail)</option>
        <option value="mobile">Mobile Number</option>
      </select>
    </div>

    <div class="mb-3" id="emailField">
      <label>Email Address</label>
      <input type="email" id="loginEmail"
             class="form-control"
             placeholder="example@gmail.com" required>
    </div>

    <div class="mb-3 d-none" id="mobileField">
      <label>Mobile Number</label>
      <input type="tel" id="loginMobile"
             class="form-control"
             maxlength="10"
             placeholder="10-digit number"
             oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    </div>

    <div class="mb-3 password-field">
      <label>Password</label>
      <input type="password" id="loginPassword"
             class="form-control"
             placeholder="Enter password" required>
      <span class="eye-icon" data-target="loginPassword">👁</span>
    </div>

    <button type="submit" class="btn-main w-100">Login</button>

    <div class="text-center mt-3">
      <a href="user_register.html" class="toggle-link">New user? Register</a>
    </div>

  </form>
</div>

<script src="../js/user.js"></script>
</body>
</html>
