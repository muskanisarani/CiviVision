<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CiviVision – Select Role</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- INLINE CSS (ONLY FOR THIS PAGE) -->
  <style>
    body {
      background: #e4ded3;
      font-family: Arial, sans-serif;
    }

    .role-wrapper {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .role-card {
      width: 380px;
      background: #9b7b5a;
      border-radius: 26px;
      padding: 40px 35px;
      text-align: center;
      box-shadow: 0 18px 40px rgba(0,0,0,0.18);
      color: #f1f1f1;
    }

    .role-card h2 {
      margin-bottom: 8px;
      font-weight: 600;
    }

    .role-subtitle {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 25px;
    }

    .role-btn {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 20px;
      font-size: 15px;
      text-decoration: none;
      transition: all 0.25s ease;
    }

    .role-btn.user {
      background: #7b5538;
      color: #fff;
      margin-bottom: 14px;
    }

    .role-btn.user:hover {
      background: #6a482f;
      transform: translateY(-2px);
    }

    .role-btn.admin {
      background: #ffffff;
      color: #333;
    }

    .role-btn.admin:hover {
      background: #f1f1f1;
      transform: translateY(-2px);
    }

    .role-footer {
      margin-top: 22px;
      font-size: 12px;
      opacity: 0.7;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="role-wrapper">

    <div class="role-card">
      <h2>CiviVision</h2>
      <p class="role-subtitle">Select your role to continue</p>

      <a href="user_login.html" class="role-btn user">
        Login as User
      </a>

      <a href="../admin/admin_login.html" class="role-btn admin">
        Login as Admin
      </a>
    </div>

    <div class="role-footer">
      © CiviVision | Team CoCreate | U.V. Patel College of Engineering
    </div>

  </div>

</body>
</html>
