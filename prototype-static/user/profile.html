<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#efe4cf;
}

/* HEADER */
.header{
  background:#b08f6b;
  color:white;
  padding:30px;
  text-align:center;
  border-bottom-left-radius:30px;
  border-bottom-right-radius:30px;
}

.avatar{
  width:80px;
  height:80px;
  border-radius:50%;
  background:white;
  margin:auto;
  font-size:40px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* CONTENT */
.container{
  padding:20px;
  padding-bottom:90px; /* space for navbar */
}

.card{
  background:#dccbb5;
  border-radius:25px;
  padding:15px;
  margin-bottom:15px;
}

/* NAVBAR */
.navbar{
  position:fixed;
  bottom:0;
  width:100%;
  background:#dccbb5;
  display:flex;
  justify-content:space-around;
  padding:10px 0;
  border-top-left-radius:25px;
  border-top-right-radius:25px;
}

.navbar div{
  text-align:center;
  font-size:12px;
  color:#5d4a35;
  cursor:pointer;
}

.navbar i{
  display:block;
  font-size:20px;
  margin-bottom:3px;
}

.active{
  color:#7b5538;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="avatar">👤</div>
  <h3>Citizen</h3>
  <p>user@gmail.com</p>
</div>

<!-- CONTENT -->
<div class="container">
  <div class="card">📍 Location: XXXXX</div>
  <div class="card">📝 Complaints Filed: 3</div>
  <div class="card">⚙ Settings</div>
</div>

<!-- NAVBAR (ONLY 3 ITEMS) -->
<div class="navbar">
  <div onclick="location.href='user_dashboard.html'">
    <i class="bi bi-house"></i>
    Home
  </div>

  <div onclick="location.href='search.html'">
    <i class="bi bi-search"></i>
    Search
  </div>

  <div class="active" onclick="location.href='profile.html'">
    <i class="bi bi-person"></i>
    Profile
  </div>
</div>

</body>
</html>
