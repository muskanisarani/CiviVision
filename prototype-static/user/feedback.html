<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback</title>

<style>
body{margin:0;font-family:Segoe UI;background:#efe4cf;}
.header{
background:#b08f6b;color:white;padding:18px 25px;
border-bottom-left-radius:30px;border-bottom-right-radius:30px;
}
.container{padding:20px;}
.card{
background:#dccbb5;border-radius:25px;padding:20px;
}
textarea{
width:100%;border:none;border-radius:20px;
padding:15px;height:120px;resize:none;
}
button{
width:100%;border:none;margin-top:15px;
background:#b08f6b;color:white;
padding:14px;border-radius:30px;font-size:16px;
}
.navbar{
position:fixed;bottom:0;width:100%;
background:#dccbb5;display:flex;justify-content:space-around;
padding:10px 0;border-top-left-radius:25px;border-top-right-radius:25px;
}
.navbar div{text-align:center;font-size:13px;color:#5d4a35;}
</style>
</head>

<body>

<div class="header">
<h3>Feedback</h3>
<p>Your opinion matters</p>
</div>

<div class="container">
<div class="card">
<textarea placeholder="Write your feedback here..."></textarea>
<button>Submit Feedback</button>
</div>
</div>



</body>
</html>
