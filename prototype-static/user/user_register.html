<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CiviVision – Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/user.css">
<script src="../js/user.js"></script>

</head>
<body>

<div class="auth-card">
  <h3>Register New User</h3>

  <form id="registerForm">

    <div class="mb-3">
      <label>Full Name</label>
      <input type="text" id="regName" class="form-control" required>
    </div>

    <div class="mb-3">
      <label>Email Address (Gmail)</label>
      <input type="email" id="regEmail"
             class="form-control"
             placeholder="example@gmail.com"
             required>
    </div>

    <div class="mb-3">
      <label>Mobile Number</label>
      <input type="tel" id="regMobile"
             class="form-control"
             maxlength="10"
             placeholder="10-digit number"
             oninput="this.value=this.value.replace(/[^0-9]/g,'')"
             required>
    </div>

    <div class="mb-3 position-relative">
      <label>Password</label>
      <input type="password" id="regPassword"
             class="form-control"
             placeholder="Minimum 6 characters"
             required>
      <span class="eye-icon" data-target="regPassword">👁</span>
    </div>

    <div class="mb-3 position-relative">
      <label>Confirm Password</label>
      <input type="password" id="regConfirmPassword"
             class="form-control"
             placeholder="Re-enter password"
             required>
      <span class="eye-icon" data-target="regConfirmPassword">👁</span>
    </div>

    <button type="submit" class="btn-main w-100">Register</button>

    <div class="text-center mt-3">
      <a href="user_login.html" class="toggle-link">Already user? Login</a>
    </div>
  </form>
</div>

<script src="user.js"></script>
</body>
</html>
